<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Violeta sólido — sobrio, una sola dirección de luz -->
    <linearGradient id="vMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- Container blanco rounded — consistente con el resto del producto -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>

  <!-- "A" monograma de trazo continuo limpio.
       Diseño sobrio tipo Linear / Vercel / Stripe — sin efectos 3D, sin gradientes complejos.
       Una sola figura: las dos piernas de la A + crossbar dibujadas como un único path. -->
  <path d="M 22 84 L 50 16 L 78 84"
        stroke="url(#vMain)"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Crossbar — ligeramente más fino, mismo color -->
  <path d="M 33 64 L 67 64"
        stroke="url(#vMain)"
        stroke-width="8"
        stroke-linecap="round"
        fill="none"/>
</svg>
