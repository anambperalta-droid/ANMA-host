<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="box" x1="4" y1="20" x2="44" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="100%" stop-color="#d4006e"/>
    </linearGradient>
    <linearGradient id="lid" x1="4" y1="14" x2="44" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff91c8"/>
      <stop offset="100%" stop-color="#e8006e"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="24" y1="0" x2="24" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff0f8"/>
      <stop offset="100%" stop-color="#ffc0e0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#c0006080"/>
    </filter>
  </defs>

  <!-- Box body -->
  <rect x="4" y="22" width="40" height="22" rx="3" fill="url(#box)" filter="url(#shadow)"/>

  <!-- Box lid -->
  <rect x="2" y="14" width="44" height="10" rx="3" fill="url(#lid)"/>

  <!-- Vertical ribbon on box body -->
  <rect x="21" y="22" width="6" height="22" rx="1" fill="url(#ribbon)" opacity="0.85"/>

  <!-- Horizontal ribbon on box lid -->
  <rect x="2" y="17" width="44" height="4" rx="1" fill="url(#ribbon)" opacity="0.85"/>

  <!-- Bow left loop -->
  <ellipse cx="17" cy="11" rx="7" ry="5" fill="#ffd6ec" opacity="0.9" transform="rotate(-30 17 11)"/>
  <!-- Bow right loop -->
  <ellipse cx="31" cy="11" rx="7" ry="5" fill="#ffd6ec" opacity="0.9" transform="rotate(30 31 11)"/>

  <!-- Bow left loop inner -->
  <ellipse cx="17.5" cy="11.5" rx="4" ry="2.8" fill="#ff7ec0" opacity="0.6" transform="rotate(-30 17.5 11.5)"/>
  <!-- Bow right loop inner -->
  <ellipse cx="30.5" cy="11.5" rx="4" ry="2.8" fill="#ff7ec0" opacity="0.6" transform="rotate(30 30.5 11.5)"/>

  <!-- Bow center knot -->
  <ellipse cx="24" cy="14" rx="4" ry="3.5" fill="#e8006e"/>
  <ellipse cx="24" cy="14" rx="2.2" ry="2" fill="#ff91c8"/>
</svg>
